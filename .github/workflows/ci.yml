name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RISC0_DEV_MODE: 1

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.1"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Run Rust tests
        run: cargo test --release

      - name: Run Clippy
        run: cargo clippy --release -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

  solidity-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache Foundry dependencies
        uses: actions/cache@v4
        with:
          path: contracts/lib
          key: ${{ runner.os }}-foundry-${{ hashFiles('contracts/package.json') }}
          restore-keys: ${{ runner.os }}-foundry-

      - name: Cache Foundry build artifacts
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: ${{ runner.os }}-foundry-build-${{ hashFiles('contracts/src/**/*.sol') }}
          restore-keys: ${{ runner.os }}-foundry-build-

      - name: Install Foundry dependencies
        run: |
          cd contracts
          forge install risc0/risc0-ethereum --no-commit --force
          forge install OpenZeppelin/openzeppelin-contracts --no-commit --force

      - name: Run Solidity tests
        run: |
          cd contracts
          forge test -vvv

      - name: Run invariant tests
        run: |
          cd contracts
          forge test --match-test invariant -vvv

      - name: Check Solidity formatting
        run: |
          cd contracts
          forge fmt --check
